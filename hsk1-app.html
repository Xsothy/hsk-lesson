<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 1 · 汉字课堂</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0c08;
  --paper: #f7f3ed;
  --red: #b5302a;
  --red2: #d4453d;
  --gold: #b8892e;
  --gold-lt: #e8c96a;
  --sage: #3d6b4f;
  --mist: #e2dbd0;
  --warm-white: #fff9f2;
  --card-bg: #ffffff;
  --shadow-sm: 0 2px 8px rgba(15,12,8,.08);
  --shadow-md: 0 6px 24px rgba(15,12,8,.12);
  --shadow-lg: 0 16px 48px rgba(15,12,8,.16);
  --radius: 14px;
  --radius-sm: 8px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  background: var(--ink);
  color: white;
  display: flex;
  align-items: center;
  padding: 0 2rem;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 200;
  gap: 0;
}
.nav-brand {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
  margin-right: 2.5rem;
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.nav-brand span { color: var(--gold-lt); }

.nav-tabs {
  display: flex;
  height: 100%;
  gap: 0;
}
.nav-tab {
  padding: 0 1.5rem;
  height: 100%;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.88rem;
  font-weight: 500;
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}
.nav-tab:hover { color: rgba(255,255,255,0.85); }
.nav-tab.active {
  color: white;
  border-bottom-color: var(--gold-lt);
}
.nav-tab .tab-icon { font-size: 1rem; }

.nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.progress-pill {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 0.3rem 0.9rem;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.7);
}
.progress-pill span { color: var(--gold-lt); font-weight: 600; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ══════════════════════════════
   LESSONS PAGE
══════════════════════════════ */
.lessons-hero {
  background: var(--ink);
  color: white;
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.lessons-hero::before {
  content: '课';
  font-family: 'Noto Serif SC', serif;
  font-size: 14rem;
  font-weight: 700;
  position: absolute;
  right: -1rem;
  top: -2rem;
  opacity: 0.04;
  color: white;
  pointer-events: none;
  line-height: 1;
}
.hero-label {
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-lt);
  margin-bottom: 0.7rem;
}
.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.8rem,5vw,2.8rem);
  font-weight: 700;
  margin-bottom: 0.6rem;
}
.hero-sub {
  color: rgba(255,255,255,0.55);
  font-size: 0.9rem;
  font-weight: 300;
}

/* Lesson cards grid */
.lessons-grid {
  max-width: 1100px;
  margin: 2.5rem auto;
  padding: 0 1.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 1.2rem;
}

.lesson-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--mist);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}
.lesson-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}
.lesson-card-top {
  padding: 1.4rem 1.4rem 1rem;
  display: flex;
  align-items: flex-start;
  gap: 1rem;
}
.lesson-emoji {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}
.lesson-meta { flex: 1; }
.lesson-num {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #9a8d7e;
  margin-bottom: 0.2rem;
}
.lesson-title-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.lesson-title-en {
  font-size: 0.78rem;
  color: #7a6d5e;
  margin-top: 0.15rem;
}
.lesson-card-body {
  padding: 0 1.4rem 1.2rem;
}
.lesson-grammar-badge {
  display: inline-block;
  background: #f3ede3;
  color: var(--gold);
  font-size: 0.68rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  margin-bottom: 0.6rem;
  letter-spacing: 0.05em;
}
.lesson-preview {
  font-size: 0.82rem;
  color: #7a6d5e;
  line-height: 1.5;
}
.lesson-card-footer {
  border-top: 1px solid var(--mist);
  padding: 0.75rem 1.4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.lesson-words-count {
  font-size: 0.75rem;
  color: #9a8d7e;
}
.lesson-words-count strong { color: var(--ink); }
.lesson-arrow {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--ink);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  transition: background 0.2s;
}
.lesson-card:hover .lesson-arrow { background: var(--red); }

/* ══════════════════════════════
   LESSON DETAIL VIEW
══════════════════════════════ */
#lesson-detail { display: none; }
#lesson-detail.active { display: block; }

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 1.2rem 2rem 0;
  font-size: 0.82rem;
  color: var(--red);
  cursor: pointer;
  font-weight: 500;
  user-select: none;
}
.detail-back:hover { text-decoration: underline; }

.detail-header {
  padding: 1.5rem 2rem 1.8rem;
  max-width: 860px;
  margin: 0 auto;
}
.detail-label {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.4rem;
}
.detail-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  margin-bottom: 0.3rem;
}
.detail-subtitle { font-size: 0.88rem; color: #7a6d5e; font-weight: 300; }

.detail-body {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

/* Section block */
.detail-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--mist);
  overflow: hidden;
}
.detail-section-head {
  padding: 1rem 1.4rem;
  background: #faf6f0;
  border-bottom: 1px solid var(--mist);
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.section-icon { font-size: 1rem; }
.detail-section-title {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7a6d5e;
}

/* Vocabulary list */
.vocab-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0;
}
.vocab-item {
  padding: 1rem 1.2rem;
  border-bottom: 1px solid #f0ebe2;
  border-right: 1px solid #f0ebe2;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-decoration: none;
  color: inherit;
  transition: background 0.15s;
  cursor: pointer;
  position: relative;
}
.vocab-item:hover { background: #fdf9f3; }
.vocab-item:hover .vocab-char { color: var(--red); }
.vocab-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.7rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  transition: color 0.15s;
}
.vocab-pinyin { font-size: 0.7rem; color: var(--red); font-weight: 500; }
.vocab-en { font-size: 0.72rem; color: #7a6d5e; }
.vocab-dict-hint {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 0.55rem;
  color: #c0b8ac;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Grammar box */
.grammar-box {
  padding: 1.4rem;
}
.grammar-rule {
  margin-bottom: 1.4rem;
}
.grammar-rule:last-child { margin-bottom: 0; }
.grammar-rule-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.3rem;
}
.grammar-pattern {
  background: #f3ede3;
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  padding: 0.5rem 0.9rem;
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  color: var(--ink);
  margin-bottom: 0.5rem;
}
.grammar-note {
  font-size: 0.77rem;
  color: #7a6d5e;
  line-height: 1.5;
}

/* Example sentences */
.sentences-list {
  padding: 0.4rem 0;
}
.sentence-item {
  padding: 1rem 1.4rem;
  border-bottom: 1px solid #f0ebe2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem 1.5rem;
  align-items: start;
}
.sentence-item:last-child { border-bottom: none; }
.sentence-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem;
  color: var(--ink);
  line-height: 1.5;
}
.sentence-pinyin {
  font-size: 0.72rem;
  color: var(--red);
  margin-top: 0.2rem;
}
.sentence-en {
  font-size: 0.82rem;
  color: #7a6d5e;
  line-height: 1.5;
  align-self: center;
}

/* Mini dialogue */
.dialogue-box {
  padding: 1.2rem 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}
.dialogue-line {
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
}
.dialogue-speaker {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}
.speaker-a { background: var(--ink); color: white; }
.speaker-b { background: var(--red); color: white; }
.dialogue-content { flex: 1; }
.dialogue-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.4;
}
.dialogue-pinyin { font-size: 0.68rem; color: var(--red); margin-top: 0.1rem; }
.dialogue-en { font-size: 0.75rem; color: #7a6d5e; margin-top: 0.1rem; }

/* ══════════════════════════════
   DICTIONARY PAGE
══════════════════════════════ */
.dict-header {
  background: linear-gradient(135deg, #1a1208 0%, #2d1f0e 100%);
  color: white;
  padding: 2.5rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.dict-header::before {
  content: '词';
  font-family: 'Noto Serif SC', serif;
  font-size: 12rem;
  font-weight: 700;
  position: absolute;
  left: -1rem;
  bottom: -2rem;
  opacity: 0.05;
  pointer-events: none;
}
.dict-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.dict-title span { color: var(--gold-lt); }
.dict-sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }

.dict-search-wrap {
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}
.dict-search {
  width: 100%;
  padding: 0.8rem 1.2rem 0.8rem 3rem;
  border-radius: 30px;
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  background: rgba(255,255,255,0.12);
  color: white;
  outline: none;
  transition: background 0.2s;
}
.dict-search::placeholder { color: rgba(255,255,255,0.35); }
.dict-search:focus { background: rgba(255,255,255,0.18); }
.dict-search-icon {
  position: absolute;
  left: 1.1rem;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
  font-size: 1rem;
}

.dict-filters {
  max-width: 1100px;
  margin: 1.5rem auto 0;
  padding: 0 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.dict-filter-btn {
  padding: 0.35rem 0.9rem;
  border: 1.5px solid var(--mist);
  background: white;
  border-radius: 20px;
  font-size: 0.76rem;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  color: #7a6d5e;
  transition: all 0.18s;
}
.dict-filter-btn:hover { border-color: var(--gold); color: var(--ink); }
.dict-filter-btn.active { background: var(--ink); border-color: var(--ink); color: white; }

.dict-grid {
  max-width: 1100px;
  margin: 1.5rem auto;
  padding: 0 1.5rem 3rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.7rem;
}
.dict-card {
  background: var(--card-bg);
  border: 1px solid var(--mist);
  border-radius: 10px;
  padding: 1rem 0.9rem 0.85rem;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
  transition: transform 0.16s, box-shadow 0.16s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.dict-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2.5px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.22s;
}
.dict-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.dict-card:hover::after { transform: scaleX(1); }

/* color stripe by category */
.dict-card[data-cat="pronoun"]::after { background: #4a90d9; }
.dict-card[data-cat="number"]::after { background: #e67e22; }
.dict-card[data-cat="noun"]::after { background: var(--sage); }
.dict-card[data-cat="verb"]::after { background: var(--red); }
.dict-card[data-cat="adj"]::after { background: #8e44ad; }
.dict-card[data-cat="time"]::after { background: var(--gold); }
.dict-card[data-cat="question"]::after { background: #16a085; }
.dict-card[data-cat="adverb"]::after { background: #c0392b; }
.dict-card[data-cat="prep"]::after { background: #2980b9; }
.dict-card[data-cat="particle"]::after { background: #7f8c8d; }
.dict-card[data-cat="measure"]::after { background: #d35400; }
.dict-card[data-cat="conj"]::after { background: #27ae60; }

.dict-char {
  font-family: 'Noto Serif SC', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}
.dict-pinyin { font-size: 0.68rem; color: var(--red); font-weight: 500; }
.dict-en { font-size: 0.66rem; color: #7a6d5e; text-align: center; line-height: 1.3; }
.dict-cat-tag {
  position: absolute;
  top: 5px; right: 6px;
  font-size: 0.5rem;
  background: var(--mist);
  color: #9a8d7e;
  padding: 1px 5px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.dict-card.hidden { display: none; }
#dict-no-results {
  display: none;
  text-align: center;
  padding: 4rem 2rem;
  color: #9a8d7e;
  max-width: 1100px;
  margin: 0 auto;
}

/* ── Responsive ── */
@media(max-width:640px){
  .sentence-item { grid-template-columns: 1fr; }
  .lessons-grid { grid-template-columns: 1fr; }
  .dict-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  .vocab-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  nav { padding: 0 1rem; }
  .nav-tab { padding: 0 0.8rem; font-size: 0.78rem; }
}

/* ── animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.lesson-card { animation: fadeUp 0.35s ease both; }
.lesson-card:nth-child(2) { animation-delay: 0.05s; }
.lesson-card:nth-child(3) { animation-delay: 0.1s; }
.lesson-card:nth-child(4) { animation-delay: 0.15s; }
.lesson-card:nth-child(5) { animation-delay: 0.2s; }
.lesson-card:nth-child(6) { animation-delay: 0.25s; }
.lesson-card:nth-child(7) { animation-delay: 0.3s; }
.lesson-card:nth-child(8) { animation-delay: 0.35s; }
.lesson-card:nth-child(9)  { animation-delay: 0.4s; }
.lesson-card:nth-child(10) { animation-delay: 0.45s; }
.lesson-card:nth-child(11) { animation-delay: 0.5s; }
.lesson-card:nth-child(12) { animation-delay: 0.55s; }

/* ── PINYIN TOGGLE ── */
.pinyin-toggle {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  user-select: none;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 0.28rem 0.8rem;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.65);
  transition: all 0.2s;
}
.pinyin-toggle:hover { background: rgba(255,255,255,0.14); color: white; }
.pinyin-toggle.active { background: var(--gold); border-color: var(--gold); color: var(--ink); font-weight: 600; }
.toggle-dot {
  width: 28px; height: 16px;
  background: rgba(255,255,255,0.2);
  border-radius: 8px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-dot::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  background: white;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.pinyin-toggle.active .toggle-dot { background: rgba(0,0,0,0.2); }
.pinyin-toggle.active .toggle-dot::after { transform: translateX(12px); }

/* hide-pinyin state */
body.hide-pinyin .vocab-pinyin,
body.hide-pinyin .dict-pinyin,
body.hide-pinyin .sentence-pinyin,
body.hide-pinyin .dialogue-pinyin,
body.hide-pinyin .card-pinyin { display: none; }

/* HSK Preview badge */
.preview-badge {
  display: inline-block;
  background: linear-gradient(90deg, var(--gold), #e8c96a);
  color: #3a2800;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 0.4rem;
  vertical-align: middle;
}
</style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="nav-brand">汉字<span>课堂</span></div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="lessons" onclick="showPage('lessons')">
      <span class="tab-icon">📖</span> Lessons
    </div>
    <div class="nav-tab" data-page="dictionary" onclick="showPage('dictionary')">
      <span class="tab-icon">📚</span> Dictionary
    </div>
  </div>
  <div class="nav-right">
    <div class="pinyin-toggle active" id="pinyin-toggle" onclick="togglePinyin()" title="Show/hide pinyin">
      <div class="toggle-dot"></div>
      拼音
    </div>
    <div class="progress-pill">HSK 1 · <span>150</span> words</div>
  </div>
</nav>

<!-- ══════════════ LESSONS PAGE ══════════════ -->
<div id="page-lessons" class="page active">
  <div class="lessons-hero">
    <div class="hero-label">HSK Level 1 · 十二单元</div>
    <h1 class="hero-title">学习汉语 · Learn Chinese</h1>
    <p class="hero-sub">Each lesson combines vocabulary, grammar patterns &amp; real sentences</p>
  </div>
  <div class="lessons-grid" id="lessons-grid"></div>
</div>

  pronoun:"Pronouns",number:"Numbers",noun:"Nouns",verb:"Verbs",
  adj:"Adjectives",time:"Time",question:"Questions",adverb:"Adverbs",
  prep:"Prepositions",particle:"Particles",measure:"Measure Words",conj:"Conjunctions"
};

function dictLink(char) {
  return `https://www.mdbg.net/chinese/dictionary?page=worddict&wdrst=0&wdqb=${encodeURIComponent(char)}`;
}

// ── PAGE SWITCHING ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelector(`[data-page="${name}"]`).classList.add('active');
  document.getElementById('lesson-detail').style.display = 'none';
  window.scrollTo(0,0);
}

// ── LESSONS ──
// ── PINYIN TOGGLE ──
let pinyinVisible = true;
function togglePinyin() {
  pinyinVisible = !pinyinVisible;
  document.body.classList.toggle('hide-pinyin', !pinyinVisible);
  const btn = document.getElementById('pinyin-toggle');
  btn.classList.toggle('active', pinyinVisible);
  btn.title = pinyinVisible ? 'Hide pinyin' : 'Show pinyin';
}

// ── LESSONS ──
function buildLessons() {
  const grid = document.getElementById('lessons-grid');
  LESSONS.forEach((L, i) => {
    const previewFlag = L.isPreview
      ? `<span class="preview-badge">+ HSK 2 Preview</span>`
      : '';
    const card = document.createElement('div');
    card.className = 'lesson-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.onclick = () => openLesson(L);
    card.innerHTML = `
      <div class="lesson-card-top">
        <div class="lesson-emoji" style="background:${L.color};">${L.emoji}</div>
        <div class="lesson-meta">
          <div class="lesson-num">Lesson ${L.id} of ${LESSONS.length}</div>
          <div class="lesson-title-zh">${L.zhTitle}${previewFlag}</div>
          <div class="lesson-title-en">${L.enTitle}</div>
        </div>
      </div>
      <div class="lesson-card-body">
        <div class="lesson-grammar-badge">${L.grammarLabel}</div>
        <div class="lesson-preview">${L.preview}</div>
      </div>
      <div class="lesson-card-footer">
        <div class="lesson-words-count"><strong>${L.vocab.length}</strong> vocabulary words</div>
        <div class="lesson-arrow">→</div>
      </div>`;
    grid.appendChild(card);
  });
}

function openLesson(L) {
  document.getElementById('page-lessons').classList.remove('active');
  const det = document.getElementById('lesson-detail');
  det.style.display = 'block';
  window.scrollTo(0, 0);

  const previewFlag = L.isPreview
    ? `<span class="preview-badge">+ HSK 2 Preview</span>`
    : `<span style="font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage);margin-left:0.4rem;vertical-align:middle;">✓ HSK 1 Core</span>`;

  document.getElementById('d-label').textContent = `Lesson ${L.id} of ${LESSONS.length} · HSK 1`;
  document.getElementById('d-title').innerHTML = `${L.emoji} ${L.zhTitle} ${previewFlag}`;
  document.getElementById('d-sub').textContent = L.enTitle + ' — ' + L.preview;

  const body = document.getElementById('d-body');
  body.innerHTML = '';

  // ── 1. Vocabulary ──
  const vocabTitle = L.isPreview
    ? 'VOCABULARY · 词汇 <span style="font-size:0.68rem;color:var(--gold);font-weight:400;margin-left:0.4rem;">★ = HSK 2 preview word</span>'
    : 'VOCABULARY · 词汇';
  const vocabSec = makeSection('📝', vocabTitle);
  const vList = document.createElement('div');
  vList.className = 'vocab-list';
  L.vocab.forEach(w => {
    const a = document.createElement('a');
    a.className = 'vocab-item';
    a.href = dictLink(w.c);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    const starBadge = w.preview
      ? `<span style="position:absolute;top:6px;left:8px;font-size:0.6rem;color:var(--gold);font-weight:700;">★</span>`
      : '';
    a.innerHTML = `${starBadge}
      <span class="vocab-dict-hint">↗ dict</span>
      <span class="vocab-char" style="${w.preview ? 'color:var(--gold)' : ''}">${w.c}</span>
      <span class="vocab-pinyin">${w.p}</span>
      <span class="vocab-en">${w.e}</span>`;
    vList.appendChild(a);
  });
  vocabSec.appendChild(vList);

  // Preview note if applicable
  if (L.isPreview) {
    const note = document.createElement('div');
    note.style.cssText = 'padding:0.7rem 1.4rem;font-size:0.75rem;color:#9a8d7e;background:#fdf9f2;border-top:1px solid #f0ebe2;line-height:1.5;';
    note.innerHTML = '★ Gold words are <strong>HSK 2 preview words</strong> — not required for HSK 1 but very useful in real conversation. They appear here naturally in context.';
    vocabSec.appendChild(note);
  }
  body.appendChild(vocabSec);

  // ── 2. Grammar ──
  const gramSec = makeSection('📐', 'GRAMMAR PATTERNS · 语法');
  const gBox = document.createElement('div');
  gBox.className = 'grammar-box';
  L.grammar.forEach(g => {
    const rule = document.createElement('div');
    rule.className = 'grammar-rule';
    rule.innerHTML = `<div class="grammar-rule-title">${g.title}</div>
      <div class="grammar-pattern">${g.pattern}</div>
      <div class="grammar-note">${g.note}</div>`;
    gBox.appendChild(rule);
  });
  gramSec.appendChild(gBox);
  body.appendChild(gramSec);

  // ── 3. Example Sentences ──
  const sentSec = makeSection('✏️', 'EXAMPLE SENTENCES · 例句');
  const sList = document.createElement('div');
  sList.className = 'sentences-list';
  L.sentences.forEach(s => {
    const item = document.createElement('div');
    item.className = 'sentence-item';
    item.innerHTML = `
      <div>
        <div class="sentence-zh">${s.zh}</div>
        <div class="sentence-pinyin">${s.py}</div>
      </div>
      <div class="sentence-en">${s.en}</div>`;
    sList.appendChild(item);
  });
  sentSec.appendChild(sList);
  body.appendChild(sentSec);

  // ── 4. Dialogue ──
  const dialSec = makeSection('💬', 'DIALOGUE PRACTICE · 对话');
  const dBox = document.createElement('div');
  dBox.className = 'dialogue-box';
  L.dialogue.forEach(line => {
    const isA = line.speaker === 'A';
    const d = document.createElement('div');
    d.className = 'dialogue-line';
    d.innerHTML = `
      <div class="dialogue-speaker ${isA ? 'speaker-a' : 'speaker-b'}">${line.speaker}</div>
      <div class="dialogue-content">
        <div class="dialogue-zh">${line.zh}</div>
        <div class="dialogue-pinyin">${line.py}</div>
        <div class="dialogue-en">${line.en}</div>
      </div>`;
    dBox.appendChild(d);
  });
  dialSec.appendChild(dBox);
  body.appendChild(dialSec);
}

function makeSection(icon, titleHTML) {
  const sec = document.createElement('div');
  sec.className = 'detail-section';
  sec.innerHTML = `<div class="detail-section-head">
    <span class="section-icon">${icon}</span>
    <span class="detail-section-title">${titleHTML}</span>
  </div>`;
  return sec;
}

function closeLessonDetail() {
  document.getElementById('lesson-detail').style.display = 'none';
  document.getElementById('page-lessons').classList.add('active');
  window.scrollTo(0, 0);
}

// ── DICTIONARY ──
function buildDict() {
  const fWrap = document.getElementById('dict-filters');
  const allBtn = document.createElement('button');
  allBtn.className = 'dict-filter-btn active';
  allBtn.textContent = 'All · 全部';
  allBtn.dataset.cat = 'all';
  allBtn.onclick = () => setDictFilter('all', allBtn);
  fWrap.appendChild(allBtn);

  const cats = [...new Set(ALL_WORDS.map(w => w.cat))];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'dict-filter-btn';
    btn.textContent = CAT_LABELS[cat] || cat;
    btn.dataset.cat = cat;
    btn.onclick = () => setDictFilter(cat, btn);
    fWrap.appendChild(btn);
  });

  const grid = document.getElementById('dict-grid');
  ALL_WORDS.forEach(w => {
    const a = document.createElement('a');
    a.className = 'dict-card';
    a.href = dictLink(w.c);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.dataset.cat = w.cat;
    a.dataset.char = w.c;
    a.dataset.pinyin = w.p.toLowerCase();
    a.dataset.english = w.e.toLowerCase();
    a.innerHTML = `<span class="dict-cat-tag">${w.cat}</span>
      <span class="dict-char">${w.c}</span>
      <span class="dict-pinyin">${w.p}</span>
      <span class="dict-en">${w.e}</span>`;
    grid.appendChild(a);
  });
}

let currentDictCat = 'all';
function setDictFilter(cat, btn) {
  currentDictCat = cat;
  document.querySelectorAll('.dict-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterDict();
}

function filterDict() {
  const q = document.getElementById('dict-search').value.toLowerCase().trim();
  let shown = 0;
  document.querySelectorAll('.dict-card').forEach(card => {
    const matchCat = currentDictCat === 'all' || card.dataset.cat === currentDictCat;
    const matchQ = !q || card.dataset.char.includes(q) || card.dataset.pinyin.includes(q) || card.dataset.english.includes(q);
    const show = matchCat && matchQ;
    card.classList.toggle('hidden', !show);
    if (show) shown++;
  });
  document.getElementById('dict-no-results').style.display = shown === 0 ? 'block' : 'none';
}

// ── INIT ──
buildLessons();
buildDict();
// Pinyin on by default — toggle button starts active
document.getElementById('pinyin-toggle').classList.add('active');
