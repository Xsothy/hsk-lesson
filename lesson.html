<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson · 汉字课堂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script defer src="js/settings.js?v=2.1"></script>
  <script defer src="js/audio-service.js?v=2.1"></script>
  <script defer src="data/lessons.js?v=2.1"></script>
  <script defer src="data/dictionary.js?v=2.1"></script>
  <script defer src="data/vocabulary.js?v=2.1"></script>
  <script defer src="data/readings.js?v=2.1"></script>
  <script defer src="js/word-map.js?v=2.1"></script>
  <script defer src="js/utils.js?v=2.1"></script>
  <script defer src="js/modal.js?v=2.1"></script>
  <script defer src="js/render.js?v=2.1"></script>
  <script defer src="js/api.js?v=2.1"></script>
  <script defer src="js/lesson.js?v=2.1"></script>
</head>
<body>
  <nav>
    <a class="nav-brand" href="index.html" aria-label="HSK lessons home">汉字<span>课堂</span></a>
    <div class="nav-tabs" aria-label="Main sections">
      <a class="nav-tab active" href="index.html">
        <span class="tab-icon" aria-hidden="true">📖</span> Lessons
      </a>
      <a class="nav-tab" href="index.html#dictionary">
        <span class="tab-icon" aria-hidden="true">📚</span> Dictionary
      </a>
    </div>
    <div class="nav-right">
      <button class="nav-btn" id="settings-btn" type="button" title="Settings" aria-label="Open settings">⚙️</button>
      <div class="progress-pill">HSK 1 · <span>150</span> words</div>
    </div>
  </nav>

  <!-- Settings Modal -->
  <div id="settings-modal" class="settings-modal">
    <div class="settings-backdrop"></div>
    <div class="settings-content">
      <div class="settings-header">
        <span>⚙️ Settings <small style="font-size: 0.6rem; opacity: 0.5;">v2.1.2</small></span>
        <button class="settings-close" type="button" aria-label="Close settings">✕</button>
      </div>

      <!-- Pinyin Display -->
      <div class="setting-group">
        <label class="setting-label">Pinyin Display</label>
        <div class="toggle-switch">
          <div class="switch" id="settings-pinyin-toggle" role="switch" aria-checked="true"></div>
          <span>Show pinyin above characters</span>
        </div>
      </div>

      <!-- Character Size -->
      <div class="setting-group">
        <label class="setting-label">Character Size</label>
        <div class="slider-group">
          <input type="range" id="char-size-slider" min="0.8" max="1.5" step="0.1" value="1.0">
          <span class="slider-value" id="char-size-value">1.0x</span>
        </div>
      </div>

      <!-- Pinyin Position -->
      <div class="setting-group">
        <label class="setting-label">Pinyin Position</label>
        <div class="toggle-switch">
          <div class="switch" id="settings-pinyin-position" role="switch" aria-checked="false"></div>
          <span id="pinyin-position-label">Above characters (default)</span>
        </div>
        <div class="setting-note">Toggle to show pinyin below characters instead</div>
      </div>

      <!-- TTS Rate -->
      <div class="setting-group">
        <label class="setting-label">Speech Rate</label>
        <div class="slider-group">
          <input type="range" id="tts-rate-slider" min="0.5" max="2.0" step="0.1" value="0.7">
          <span class="slider-value" id="tts-rate-value">0.7x</span>
        </div>
        <div class="setting-note">Text-to-speech playback speed</div>
      </div>

      <!-- TTS Voice Selection -->
      <div class="setting-group">
        <label class="setting-label">Voice</label>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
          <select id="tts-voice-select" class="voice-select" style="flex: 1;">
            <option value="">Loading voices...</option>
          </select>
          <button id="refresh-voices-btn" class="settings-btn" style="width: auto; padding: 0.6rem;" title="Refresh voices">🔄</button>
        </div>
        <button class="settings-btn settings-btn-secondary" id="test-voice-btn" type="button">
          🔊 Test Voice
        </button>
        <div class="setting-note">Select voice and test it. If list is empty, try clicking 🔄.</div>
      </div>

      <!-- Dark Mode - Hidden for now -->
      <!-- <div class="setting-group" style="display: none;">
        <label class="setting-label">Dark Mode</label>
        <div class="toggle-switch">
          <div class="switch" id="settings-dark-toggle" role="switch" aria-checked="false"></div>
          <span>Enable dark theme</span>
        </div>
      </div> -->

      <!-- Action Buttons -->
      <div class="settings-actions">
        <button class="settings-btn settings-btn-primary" id="settings-save" type="button">Save & Close</button>
        <button class="settings-btn settings-btn-danger" id="settings-reset" type="button">Reset to Defaults</button>
      </div>

      <!-- Debug Section -->
      <div id="settings-debug" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px dashed var(--mist); font-family: monospace; font-size: 0.6rem; color: #9a8d7e;">
        <div>Debug Logs:</div>
        <div id="debug-console" style="max-height: 80px; overflow-y: auto; background: rgba(0,0,0,0.03); padding: 0.4rem; border-radius: 4px;"></div>
      </div>
    </div>
  </div>

  <main id="lesson-detail" class="active">
    <a class="detail-back" href="index.html">← Back to Lessons</a>
    <div class="detail-header">
      <div class="detail-label" id="d-label"></div>
      <h1 class="detail-title" id="d-title"></h1>
      <div class="detail-subtitle" id="d-sub"></div>
    </div>
    <div class="detail-body" id="d-body" aria-live="polite"></div>
  </main>

</body>
</html>
