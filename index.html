<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK 1 · 汉字课堂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script defer src="js/template-loader.js"></script>
  <script defer src="data/lessons.js"></script>
  <script defer src="data/dictionary.js"></script>
  <script defer src="data/vocabulary.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/modal.js"></script>
  <script defer src="js/render.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <nav>
    <a class="nav-brand" href="index.html" aria-label="HSK lessons home">汉字<span>课堂</span></a>
    <div class="nav-tabs" role="tablist" aria-label="Main sections">
      <button class="nav-tab active" type="button" data-page="lessons">
        <span class="tab-icon" aria-hidden="true">📖</span> Lessons
      </button>
      <button class="nav-tab" type="button" data-page="dictionary">
        <span class="tab-icon" aria-hidden="true">📚</span> Dictionary
      </button>
    </div>
    <div class="nav-right">
      <button class="pinyin-toggle active" type="button" id="pinyin-toggle" title="Hide pinyin" aria-pressed="true">
        <span class="toggle-dot" aria-hidden="true"></span>
        拼音
      </button>
      <div class="progress-pill">HSK 1 · <span>150</span> words</div>
    </div>
  </nav>

  <main>
    <section id="page-lessons" class="page active">
      <div class="lessons-hero">
        <div class="hero-label">HSK Level 1 · 十二单元</div>
        <h1 class="hero-title">学习汉语 · Learn Chinese</h1>
        <p class="hero-sub">Each lesson combines vocabulary, grammar patterns &amp; real sentences</p>
      </div>
      <div class="lessons-grid" id="lessons-grid" aria-live="polite"></div>
    </section>

    <section id="page-dictionary" class="page">
      <div class="dict-header">
        <div class="dict-title">词典 · <span>Dictionary</span></div>
        <div class="dict-sub">All 150 HSK 1 words · click any character to open full entry</div>
        <div class="dict-search-wrap">
          <span class="dict-search-icon" aria-hidden="true">🔍</span>
          <input type="search" class="dict-search" id="dict-search" placeholder="Search character, pinyin or English…" autocomplete="off">
        </div>
      </div>
      <div class="dict-filters" id="dict-filters" aria-label="Dictionary filters"></div>
      <div class="dict-grid" id="dict-grid" aria-live="polite"></div>
      <div id="dict-no-results">No words match your search.</div>
    </section>
  </main>
</body>
</html>
