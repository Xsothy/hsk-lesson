<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graceful Degradation Test</title>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 2rem 0;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .test-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .result {
            font-size: 1.5rem;
            line-height: 2;
            margin: 1rem 0;
        }
        ruby {
            ruby-position: over;
        }
        rt {
            font-size: 0.6em;
            color: #666;
        }
        .status {
            padding: 0.5rem;
            border-radius: 4px;
            margin-top: 0.5rem;
        }
        .status.pass {
            background-color: #d4edda;
            color: #155724;
        }
        .status.fail {
            background-color: #f8d7da;
            color: #721c24;
        }
        .console-output {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .console-warning {
            color: #856404;
            margin: 0.25rem 0;
        }
    </style>
</head>
<body>
    <h1>🧪 Task 10.1: Graceful Degradation Test</h1>
    <p>This page tests the graceful degradation behavior for missing words in WORD_MAP.</p>
    
    <div class="test-section">
        <div class="test-title">Test 1: Missing word renders as plain text</div>
        <div id="test1-result" class="result"></div>
        <div id="test1-status" class="status"></div>
    </div>
    
    <div class="test-section">
        <div class="test-title">Test 2: Multiple missing words</div>
        <div id="test2-result" class="result"></div>
        <div id="test2-status" class="status"></div>
    </div>
    
    <div class="test-section">
        <div class="test-title">Test 3: Missing word with punctuation</div>
        <div id="test3-result" class="result"></div>
        <div id="test3-status" class="status"></div>
    </div>
    
    <div class="test-section">
        <div class="test-title">Test 4: All words missing</div>
        <div id="test4-result" class="result"></div>
        <div id="test4-status" class="status"></div>
    </div>
    
    <div class="console-output">
        <strong>Console Warnings:</strong>
        <div id="console-log"></div>
    </div>

    <script src="js/word-map.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/render.js"></script>
    
    <script>
        // Capture console warnings
        const consoleLog = document.getElementById('console-log');
        const warnings = [];
        
        const originalWarn = console.warn;
        console.warn = function(...args) {
            const msg = args.join(' ');
            warnings.push(msg);
            const div = document.createElement('div');
            div.className = 'console-warning';
            div.textContent = msg;
            consoleLog.appendChild(div);
            originalWarn.apply(console, args);
        };
        
        function runTest(testId, line, expectedBehavior) {
            const resultDiv = document.getElementById(`${testId}-result`);
            const statusDiv = document.getElementById(`${testId}-status`);
            
            try {
                const fragment = window.HSK_RENDER.renderLine(line);
                resultDiv.appendChild(fragment);
                
                // Check if test passed
                const html = resultDiv.innerHTML;
                const text = resultDiv.textContent;
                
                let passed = true;
                let message = '';
                
                // Basic check: output should contain all original words
                for (const word of line.words) {
                    if (!text.includes(word)) {
                        passed = false;
                        message = `Missing word "${word}" in output`;
                        break;
                    }
                }
                
                if (passed) {
                    statusDiv.className = 'status pass';
                    statusDiv.textContent = '✅ Pass: ' + expectedBehavior;
                } else {
                    statusDiv.className = 'status fail';
                    statusDiv.textContent = '❌ Fail: ' + message;
                }
            } catch (error) {
                statusDiv.className = 'status fail';
                statusDiv.textContent = '❌ Error: ' + error.message;
            }
        }
        
        // Test 1: Missing word renders as plain text
        runTest('test1', {
            zh: '你好未知词再见',
            words: ['你好', '未知词', '再见'],
            en: 'Hello unknown goodbye'
        }, 'Missing word rendered as plain text, other words have pinyin');
        
        // Test 2: Multiple missing words
        runTest('test2', {
            zh: '你好缺失词1测试缺失词2再见',
            words: ['你好', '缺失词1', '测试', '缺失词2', '再见'],
            en: 'Multiple missing words'
        }, 'All words rendered, multiple warnings logged');
        
        // Test 3: Missing word with punctuation
        runTest('test3', {
            zh: '我是学生未知词！',
            words: ['我', '是', '学生', '未知词', '！'],
            en: 'Missing word with punctuation'
        }, 'Punctuation and missing word both render correctly');
        
        // Test 4: All words missing
        runTest('test4', {
            zh: '完全缺失的词汇',
            words: ['完全缺失的词汇'],
            en: 'All words missing'
        }, 'No errors thrown, text still renders');
        
        // Summary
        setTimeout(() => {
            const warningCount = warnings.filter(w => w.includes('[renderer]') && w.includes('not found in WORD_MAP')).length;
            const summary = document.createElement('div');
            summary.style.marginTop = '1rem';
            summary.style.fontWeight = 'bold';
            summary.textContent = `Total warnings logged: ${warningCount}`;
            consoleLog.appendChild(summary);
        }, 100);
    </script>
</body>
</html>
